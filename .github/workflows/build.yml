name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon
            target: mac-aarch64
          - os: windows-11-arm      # matches UTM Win11-ARM VM
            target: win-aarch64
          - os: ubuntu-24.04-arm    # matches UTM Ubuntu-ARM VM
            target: linux-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Linux system deps (webkit2gtk)
        if: matrix.target == 'linux-aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev xdg-utils file

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @solopdf/core build
      - run: pnpm --filter @solopdf/core test

      - name: Build Tauri app
        run: pnpm --filter solopdf-app tauri build
        env:
          CI: true

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p out
          case "${{ matrix.target }}" in
            mac-aarch64)
              cp app/src-tauri/target/release/bundle/dmg/*.dmg out/ ;;
            win-aarch64)
              cp app/src-tauri/target/release/bundle/nsis/*.exe out/ 2>/dev/null || true
              cp app/src-tauri/target/release/bundle/msi/*.msi out/ 2>/dev/null || true ;;
            linux-aarch64)
              cp app/src-tauri/target/release/bundle/deb/*.deb out/ 2>/dev/null || true
              cp app/src-tauri/target/release/bundle/appimage/*.AppImage out/ 2>/dev/null || true ;;
          esac
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: solopdf-${{ matrix.target }}
          path: out/*
          if-no-files-found: error
